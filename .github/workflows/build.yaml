name: Android CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]

  pull_request:

  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup Project Metadata
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      version: ${{ steps.meta.outputs.version }}
      mode: ${{ steps.mode.outputs.mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Read app metadata dynamically ────────────────────────
      - name: Extract app metadata
        id: meta
        run: |
          APP_NAME=$(node -p "require('./app.json').expo.name")
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Decide build mode ────────────────────────────────────
      - name: Determine build mode
        id: mode
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_REF}" == "refs/heads/main" || "${{ github.event.inputs.build_type }}" == "release" ]]; then
            echo "mode=release" >> $GITHUB_OUTPUT
          else
            echo "mode=debug" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: setup

    env:
      APP_NAME: ${{ needs.setup.outputs.app_name }}
      VERSION: ${{ needs.setup.outputs.version }}
      MODE: ${{ needs.setup.outputs.mode }}
      EXPO_NO_TELEMETRY: "1"

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Install deps ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Expo prebuild ────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install --non-interactive

      # ── Java ─────────────────────────────────────────────────
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android SDK ──────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle cache ─────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Keystore (release only) ──────────────────────────────
      - name: Decode Keystore
        if: env.MODE == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── Build APK ────────────────────────────────────────────
      - name: Build Debug APK
        if: env.MODE == 'debug'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: env.MODE == 'release'
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── Dynamic APK naming ───────────────────────────────────
      - name: Rename APK
        if: env.MODE == 'release'
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "${VERSION}" == "${GITHUB_REF}" ]]; then
            VERSION="v${VERSION}"
          fi

          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/${APP_NAME}-${VERSION}.apk

      # ── Upload artifacts ─────────────────────────────────────
      - name: Upload Debug APK
        if: env.MODE == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: ${APP_NAME}-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: env.MODE == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${APP_NAME}-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk

      # ── GitHub Release (tags only) ──────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📦 ${{ env.APP_NAME }} ${{ github.ref_name }}

            **Version:** ${{ env.VERSION }}

            ### Installation
            - Download APK below
            - Enable unknown sources
            - Install normally

            ### Build Info
            - Mode: ${{ env.MODE }}
            - Commit: ${{ github.sha }}

          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}